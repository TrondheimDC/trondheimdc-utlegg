name: CD - Build & Deploy

on:
  push:
    branches: ["main"]

  # Allows manual trigger from Actions tab
  workflow_dispatch:

concurrency:
  group: "deploy"
  cancel-in-progress: false

env:
  DEPLOY_PATH: /var/www/sites/utlegg.trondheimdc.no/public
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise (Node, pnpm, biome)
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Build app
        run: mise run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: out/
          retention-days: 1

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise (Node, pnpm, biome)
        uses: jdx/mise-action@v2
        with:
          install: true

      - name: Install dependencies
        run: mise run install

      - name: Run lint
        run: mise run lint

  deploy:
    runs-on: ubuntu-latest
    needs: [build, lint]
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: site
          path: out/

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy to server via rsync
        run: |
          rsync -rlvz --delete \
            -e "ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no" \
            out/ \
            "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:${{ env.DEPLOY_PATH }}/"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  summary:
    runs-on: ubuntu-latest
    needs: [build, lint, deploy]
    if: always()
    steps:
      - name: Create job summary
        run: |
          echo "## 🚀 Deployment Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Job | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-----|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🏗️ Build | ${{ needs.build.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🔍 Lint | ${{ needs.lint.result == 'success' && '✅ Passed' || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| 🌐 Deploy | ${{ needs.deploy.result == 'success' && '✅ Deployed' || '❌ Failed' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### 📋 Details" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Branch:** \`${{ github.ref_name }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Commit:** \`${{ github.sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Triggered by:** ${{ github.actor }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL:** https://utlegg.trondheimdc.no" >> "$GITHUB_STEP_SUMMARY"
